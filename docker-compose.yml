services:
  soapbuy-bot:
    build: .
    container_name: soapbuy-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=UTC
      - PYTHONUNBUFFERED=1
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
